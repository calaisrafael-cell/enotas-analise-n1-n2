<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%2300B2AA'/><text x='16' y='22' text-anchor='middle' font-size='18' font-family='Arial' font-weight='bold' fill='white'>G</text></svg>"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Gestão de Conhecimento — eNotas</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&family=Nunito+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --primary:#00B2AA;--primary-dark:#008F88;--primary-light:#E6F8F7;--primary-mid:#00C9C0;
  --accent:#F4693B;--accent-light:#FDF0EB;
  --purple:#8B2FC9;
  --bg:#F4F6F9;--surface:#FFFFFF;--surface2:#F8FAFA;
  --text:#2D3748;--text2:#5A6A7A;--text3:#A0ADB8;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,178,170,0.25);
  --green:#10B981;--green-bg:#ECFDF5;
  --yellow:#F59E0B;--yellow-bg:#FFFBEB;
  --red:#EF4444;--red-bg:#FEF2F2;
  --radius:12px;--radius-sm:8px;--shadow:0 1px 4px rgba(0,0,0,.06),0 6px 16px rgba(0,0,0,.06);
  --shadow-md:0 4px 12px rgba(0,178,170,.15);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}

/* ── HEADER ── */
.header{background:#fff;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;border-bottom:2px solid var(--primary);box-shadow:0 2px 12px rgba(0,178,170,.1)}
.header-logo{display:flex;align-items:center;height:40px}
.header-logo img{height:36px;width:auto;object-fit:contain}
.logo-placeholder{height:36px;display:flex;align-items:center;padding:4px 10px;border-radius:6px}
.logo-hm{background:var(--accent);color:#fff;font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;letter-spacing:1px}
.logo-en{background:var(--primary);color:#fff;font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;letter-spacing:.5px}
.header-center{display:flex;flex-direction:column;align-items:center}
.header-title{color:var(--text);font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;letter-spacing:.3px}
.header-sub{color:var(--text3);font-size:11px;margin-top:1px}
.header-right{display:flex;align-items:center;gap:8px}
.hdr-btn{background:var(--primary-light);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--primary-dark);font-size:12px;padding:6px 12px;cursor:pointer;font-family:inherit;transition:.15s}
.hdr-btn:hover{background:var(--primary);color:#fff}
.hdr-badge{font-size:11px;background:var(--primary-light);color:var(--primary-dark);padding:4px 12px;border-radius:20px;white-space:nowrap;border:1px solid var(--border2);font-weight:600}

/* ── LAYOUT ── */
.layout{display:flex;flex:1;overflow:hidden;min-height:0}

/* ── SIDEBAR ── */
.sidebar{width:230px;min-width:230px;background:#fff;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid rgba(0,178,170,.15)}
.sb-agent-area{padding:12px;border-bottom:1px solid rgba(0,178,170,.12);background:var(--primary-light)}
.sb-label{color:var(--primary-dark);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;padding:0 4px}
.agent-pills{display:flex;flex-direction:column;gap:4px}
.agent-pill{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;transition:.12s;border:1px solid transparent}
.agent-pill:hover{background:rgba(0,178,170,.08)}
.agent-pill.active-rapha{background:var(--primary-light);border-color:var(--border2)}
.agent-pill.active-calais{background:#FDF0EB;border-color:rgba(244,105,59,.3)}
.agent-pill.active-ale{background:#FFFBEB;border-color:rgba(245,158,11,.3)}
.pill-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pill-name{color:var(--text);font-size:13px;font-weight:600;flex:1;font-family:'Nunito',sans-serif}
.pill-count{font-size:11px;color:var(--text3)}
.sb-list{flex:1;overflow-y:auto;padding:8px;background:#FAFCFC}
.sb-list::-webkit-scrollbar{width:4px}
.sb-list::-webkit-scrollbar-track{background:transparent}
.sb-list::-webkit-scrollbar-thumb{background:rgba(0,178,170,.2);border-radius:4px}
.sb-grupo-label{color:var(--primary-dark);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:8px 6px 4px;display:flex;justify-content:space-between;align-items:center}
.sb-grupo-count{font-size:9px;background:var(--primary-light);padding:2px 6px;border-radius:10px;color:var(--primary-dark);border:1px solid var(--border2)}
.sb-item{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:var(--radius-sm);cursor:pointer;transition:.1s;margin-bottom:1px;border:1px solid transparent}
.sb-item:hover{background:var(--primary-light)}
.sb-item.active{background:var(--primary-light);border-color:var(--border2)}
.sb-item.done{opacity:.6}
.sb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:.2s}
.sb-dot.d-pending{background:#D1D5DB}
.sb-dot.d-done-rapha{background:var(--primary)}
.sb-dot.d-done-calais{background:var(--accent)}
.sb-dot.d-done-ale{background:#F59E0B}
.sb-dot.d-active{background:var(--primary)}
.sb-id{font-family:'Nunito',sans-serif;font-size:11px;font-weight:600;color:var(--text);flex:1}
.sb-cat{font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:115px}

/* ── MAIN ── */
.main-area{flex:1;overflow-y:auto;background:var(--bg);display:flex;flex-direction:column}

/* Loading */
.loading-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--text2)}
.spinner{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--en-teal);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Home */
.home-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px}
.home-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:28px;max-width:420px;width:100%}
.home-title{font-family:'Nunito',sans-serif;font-size:18px;font-weight:700;margin-bottom:4px}
.home-sub{font-size:13px;color:var(--text2);margin-bottom:22px;line-height:1.5}
.home-agent-card{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;margin-bottom:8px;transition:.12s;background:var(--surface)}
.home-agent-card:hover{border-color:var(--primary);background:var(--primary-light)}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;font-family:'Nunito',sans-serif}
.av-rapha{background:var(--primary);color:#fff}
.av-calais{background:var(--accent);color:#fff}
.av-ale{background:var(--yellow);color:#fff}
.av-info{flex:1}
.av-name{font-weight:700;font-size:14px;font-family:'Nunito',sans-serif;margin-bottom:3px}
.av-stat{font-size:12px;color:var(--text2)}
.prog-row{display:flex;align-items:center;gap:8px;margin-top:6px}
.prog-bar{flex:1;background:var(--border2);border-radius:4px;height:4px}
.prog-fill{height:4px;border-radius:4px;transition:width .4s}
.pf-rapha{background:var(--primary)}
.pf-calais{background:var(--accent)}
.pf-ale{background:var(--yellow)}
.prog-pct{font-size:11px;color:var(--text3);min-width:28px;text-align:right}
.home-export-btn{display:block;width:100%;margin-top:16px;padding:9px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:transparent;color:var(--text2);font-size:13px;cursor:pointer;text-align:center;font-family:inherit;transition:.12s}
.home-export-btn:hover{border-color:var(--primary);color:var(--primary-dark)}

/* Analyze */
.analyze-wrap{padding:20px;max-width:780px;margin:0 auto;width:100%}
.ticket-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:12px}
.ticket-id-big{font-family:'Nunito',sans-serif;font-size:22px;font-weight:700;color:var(--text)}
.ticket-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.t-badge{font-size:11px;padding:3px 10px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);font-weight:500}
.t-badge-cat{background:var(--primary-light);border-color:var(--border2);color:var(--primary-dark)}
.t-badge-done{background:var(--green-bg);border-color:rgba(16,185,129,.3);color:var(--green)}
.section-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px;margin-bottom:12px}
.section-title{font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.section-num{width:22px;height:22px;border-radius:50%;background:var(--primary);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.q-block{margin-bottom:14px}
.q-label{font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px}
.q-sub{font-size:12px;color:var(--text2);margin-bottom:6px;margin-top:-4px}
.radio-row{display:flex;gap:6px;flex-wrap:wrap}
.ropt{padding:6px 14px;border:1px solid var(--border2);border-radius:20px;background:var(--surface);font-size:12px;font-weight:600;cursor:pointer;transition:.1s;color:var(--text2);user-select:none;font-family:inherit}
.ropt:hover{border-color:var(--en-teal);color:var(--en-teal-dark)}
.ropt.sel-sim{background:var(--green-bg);border-color:rgba(16,185,129,.5);color:var(--green)}
.ropt.sel-nao{background:var(--red-bg);border-color:rgba(239,68,68,.4);color:var(--red)}
.ropt.sel-na{background:var(--surface2);border-color:var(--border2);color:var(--text2)}
.ropt.sel-dentro{background:var(--green-bg);border-color:rgba(16,185,129,.5);color:var(--green)}
.ropt.sel-abaixo{background:var(--yellow-bg);border-color:rgba(245,158,11,.4);color:var(--yellow)}
.ropt.sel-acima{background:var(--red-bg);border-color:rgba(239,68,68,.4);color:var(--red)}
.ropt.sel-gen{background:var(--en-teal-bg);border-color:rgba(0,189,176,.4);color:var(--en-teal-dark)}
textarea.tinput{width:100%;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface2);font-size:13px;color:var(--text);resize:vertical;min-height:60px;font-family:inherit;margin-top:8px;transition:.15s;line-height:1.5}
textarea.tinput:focus{outline:none;border-color:var(--primary);background:#fff;box-shadow:0 0 0 3px rgba(0,178,170,.12)}
textarea.tinput::placeholder{color:var(--text3)}
.act-bar{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;padding:16px 20px;background:var(--surface);border-top:1px solid var(--border);position:sticky;bottom:0;border-radius:0 0 var(--radius) var(--radius)}
.btn{padding:9px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;transition:.12s;font-family:inherit;border:1px solid transparent}
.btn:active{transform:scale(.98)}
.btn-teal{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-teal:hover{background:var(--primary-dark)}
.btn-teal:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-outline{background:transparent;border-color:var(--border2);color:var(--text2)}
.btn-outline:hover{border-color:var(--en-teal);color:var(--en-teal-dark)}
.btn-outline:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{background:transparent;border:none;color:var(--text3);font-size:12px;padding:9px 12px}
.btn-ghost:hover{color:var(--text2)}
.spacer{flex:1}
.done-banner{background:var(--green-bg);border:1px solid rgba(16,185,129,.3);border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:14px;font-size:13px;color:var(--green);font-weight:600;display:flex;align-items:center;gap:8px}
.done-banner::before{content:"✓";width:20px;height:20px;background:var(--green);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}

/* Export */
.export-wrap{padding:24px;max-width:700px;margin:0 auto;width:100%}
.export-title{font-family:'Nunito',sans-serif;font-size:20px;font-weight:700;margin-bottom:4px}
.export-sub{font-size:13px;color:var(--text2);margin-bottom:20px}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;text-align:center}
.stat-val{font-family:'Nunito',sans-serif;font-size:24px;font-weight:700;color:var(--text)}
.stat-lbl{font-size:12px;color:var(--text2);margin-top:3px}
.exp-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 18px;margin-bottom:10px}
.exp-card-title{font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;margin-bottom:4px}
.exp-card-sub{font-size:12px;color:var(--text2);margin-bottom:12px}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}
.exp-prog{margin-top:14px}
.exp-agent-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.exp-av{width:28px;height:28px;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Nunito',sans-serif}
.exp-name{font-size:13px;font-weight:600;width:60px}
.exp-bar-wrap{flex:1;background:var(--border);border-radius:4px;height:6px}
.exp-bar-fill{height:6px;border-radius:4px}
.exp-stat{font-size:12px;color:var(--text2);min-width:60px;text-align:right}

/* Config banner */


@media(max-width:640px){
  .sidebar{width:180px;min-width:180px}
  .analyze-wrap,.export-wrap{padding:12px}
}
</style>
</head>

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// COLE AQUI O URL DO SEU APPS SCRIPT (@gmail.com)
const SCRIPT_URL='';
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const ALL_IDS=Object.values(TICKETS).flat().map(t=>t[0]);
const AGENT_OF=Object.fromEntries(Object.entries(TICKETS).flatMap(([a,ts])=>ts.map(t=>[t[0],a])));
const AGENTS=['Rapha','Calais','Alê'];
const AGENT_DOT_CLASS={Rapha:'d-done-rapha',Calais:'d-done-calais','Alê':'d-done-ale'};
const AGENT_PILL_CLASS={Rapha:'active-rapha',Calais:'active-calais','Alê':'active-ale'};
const AGENT_AV={Rapha:'av-rapha',Calais:'av-calais','Alê':'av-ale'};
const AGENT_PF={Rapha:'pf-rapha',Calais:'pf-calais','Alê':'pf-ale'};
const AGENT_DOT_COLOR={Rapha:'#00B2AA',Calais:'#F4693B','Alê':'#F59E0B'};

// ── STATE ─────────────────────────────────────────────────────
let S={
  agent:null,idx:0,analyses:{},form:{},
  screen:'loading',saving:false,
  scriptUrl:localStorage.getItem('enotas_sheetdb_url')||SCRIPT_URL
};

// ── INIT ──────────────────────────────────────────────────────
async function init(){
  let sheetLoaded=false;
  if(S.scriptUrl){
    try{
      const r=await fetch(S.scriptUrl+'?limit=500&sheet=P%C3%A1gina1');
      const rows=await r.json();
      if(Array.isArray(rows)){
        S.analyses={};
        rows.forEach(row=>{
          const id=row['Ticket ID'];
          if(id){
            S.analyses[String(id)]={
              ticketId:id,agent:row['Agente'],tema:row['Tema'],categoria:row['Categoria'],
              q1:row['Contact Reason Correto']||'',
              q2:row['Macros Utilizadas']||'',
              q3:row['Tempo vs FR']||'',
              q4:row['Material de Consulta']||'',
              q5:row['Escalonamento N1→N2']||'',
              q5j:row['Justificativa N1→N2']||'',
              q6:row['Escalonamento N2→N3']||'',
              q6j:row['Justificativa N2→N3']||'',
              obs:row['Observações']||'',
              savedAt:row['Timestamp']||''
            };
          }
        });
        cacheAnalyses();
        sheetLoaded=true;
      }
    }catch(e){console.warn('SheetDB:',e);}
  }
  if(!sheetLoaded) S.analyses=getCachedAnalyses();
  renderAgentPills();
  updateProgress();
  setScreen('home');
}

function getCachedAnalyses(){
  try{return JSON.parse(localStorage.getItem('enotas_cache')||'{}');}catch{return{};}
}
function cacheAnalyses(){localStorage.setItem('enotas_cache',JSON.stringify(S.analyses));}

// ── SAVE ──────────────────────────────────────────────────────
async function saveAnalysis(goNext=true){
  const tkt=TICKETS[S.agent][S.idx];
  const data={...S.form,ticketId:tkt[0],agent:S.agent,tema:tkt[1],categoria:tkt[2],savedAt:new Date().toISOString()};
  S.analyses[tkt[0]]=data;
  cacheAnalyses();
  updateProgress();
  renderSidebar();
  renderAgentPills();

  // SheetDB POST — mesmo padrão do forms
  if(S.scriptUrl){
    const tkt=TICKETS[S.agent][S.idx];
    const payload={
      'Timestamp':new Date().toISOString(),
      'Ticket ID':String(tkt[0]),
      'Agente':S.agent,
      'Tema':tkt[1],
      'Categoria':tkt[2],
      'Contact Reason Correto':S.form.q1||'',
      'Macros Utilizadas':S.form.q2||'',
      'Tempo vs FR':S.form.q3||'',
      'Material de Consulta':(S.form.q4||'').substring(0,500),
      'Escalonamento N1→N2':S.form.q5||'',
      'Justificativa N1→N2':(S.form.q5j||'').substring(0,300),
      'Escalonamento N2→N3':S.form.q6||'',
      'Justificativa N2→N3':(S.form.q6j||'').substring(0,300),
      'Observações':(S.form.obs||'').substring(0,400)
    };
    fetch(S.scriptUrl,{
      method:'POST',
      headers:{'Content-Type':'application/json','Accept':'application/json'},
      body:JSON.stringify({data:payload,sheet:'Página1'})
    }).catch(e=>console.warn('SheetDB save:',e));
  }
  toast('Salvo ✓');

  if(goNext&&S.idx<TICKETS[S.agent].length-1){
    S.idx++;
    S.form=S.analyses[TICKETS[S.agent][S.idx][0]]||{};
    renderAnalyze();
    renderSidebar();
    scrollSidebar();
  }
}

// ── SCREENS ───────────────────────────────────────────────────
function setScreen(name){
  S.screen=name;
  ['loading','home','analyze','export'].forEach(s=>{
    document.getElementById('screen-'+s).style.display=s===name?'':'none';
  });
  if(name==='home')renderHome();
  if(name==='analyze')renderAnalyze();
  if(name==='export')renderExport();
}

function agentDone(a){return TICKETS[a].filter(t=>S.analyses[t[0]]).length;}
function agentTotal(a){return TICKETS[a].length;}
function agentPct(a){return Math.round(agentDone(a)/agentTotal(a)*100);}
function totalDone(){return ALL_IDS.filter(id=>S.analyses[id]).length;}

function updateProgress(){
  const d=totalDone();
  document.getElementById('hdr-progress').textContent=d+' / 248';
}

// ── HOME ──────────────────────────────────────────────────────
function renderHome(){
  const el=document.getElementById('screen-home');
  el.className='home-wrap';
  el.innerHTML=`<div class="home-card">
    <div class="home-title">Gestão de Conhecimento — eNotas</div>
    <div class="home-sub">Selecione seu nome para começar. Os dados são sincronizados com a planilha Google Sheets em tempo real.</div>
    ${AGENTS.map(a=>`
    <div class="home-agent-card" onclick="selectAgent('${a}')">
      <div class="avatar ${AGENT_AV[a]}">${a[0]}</div>
      <div class="av-info">
        <div class="av-name">${a}</div>
        <div class="av-stat">${agentDone(a)} de ${agentTotal(a)} tickets analisados</div>
        <div class="prog-row">
          <div class="prog-bar"><div class="prog-fill ${AGENT_PF[a]}" style="width:${agentPct(a)}%"></div></div>
          <div class="prog-pct">${agentPct(a)}%</div>
        </div>
      </div>
    </div>`).join('')}
    <button class="home-export-btn" onclick="setScreen('export')">Ver relatório e exportar dados →</button>
  </div>`;
  updateProgress();
}

function selectAgent(a){
  S.agent=a;
  // Go to first pending ticket
  const pending=TICKETS[a].findIndex(t=>!S.analyses[t[0]]);
  S.idx=pending>=0?pending:0;
  S.form=S.analyses[TICKETS[a][S.idx][0]]||{};
  renderAgentPills();
  renderSidebar();
  setScreen('analyze');
}

// ── AGENT PILLS ───────────────────────────────────────────────
function renderAgentPills(){
  const el=document.getElementById('agent-pills');
  el.innerHTML=AGENTS.map(a=>`
    <div class="agent-pill ${S.agent===a?AGENT_PILL_CLASS[a]:''}" onclick="selectAgent('${a}')">
      <div class="pill-dot" style="background:${AGENT_DOT_COLOR[a]}"></div>
      <span class="pill-name">${a}</span>
      <span class="pill-count">${agentDone(a)}/${agentTotal(a)}</span>
    </div>`).join('');
}

// ── SIDEBAR ───────────────────────────────────────────────────
function renderSidebar(){
  if(!S.agent)return;
  const el=document.getElementById('sb-list');
  const groups={};
  TICKETS[S.agent].forEach((t,i)=>{
    if(!groups[t[1]])groups[t[1]]=[];
    groups[t[1]].push({id:t[0],cat:t[2],tema:t[1],i});
  });
  el.innerHTML=Object.entries(groups).map(([tema,tks])=>`
    <div class="sb-grupo-label">${tema}<span class="sb-grupo-count">${tks.filter(t=>S.analyses[t.id]).length}/${tks.length}</span></div>
    ${tks.map(t=>{
      const done=!!S.analyses[t.id];
      const active=t.i===S.idx&&S.screen==='analyze';
      const dotCls=active?'d-active':done?AGENT_DOT_CLASS[S.agent]:'d-pending';
      return`<div class="sb-item${active?' active':''}${done&&!active?' done':''}" id="sbt-${t.id}" onclick="jumpTo(${t.i})">
        <div class="sb-dot ${dotCls}"></div>
        <div style="overflow:hidden">
          <div class="sb-id">${t.id}</div>
          <div class="sb-cat">${t.cat.split('/')[0].trim()}</div>
        </div>
      </div>`;}).join('')}`).join('');
}

function jumpTo(i){
  S.idx=i;
  S.form=S.analyses[TICKETS[S.agent][i][0]]||{};
  renderSidebar();
  renderAnalyze();
  setScreen('analyze');
}

function scrollSidebar(){
  const el=document.getElementById('sbt-'+TICKETS[S.agent][S.idx][0]);
  if(el)el.scrollIntoView({block:'nearest',behavior:'smooth'});
}

// ── ANALYZE ───────────────────────────────────────────────────

        <div class="q-block">
          <div class="q-label">Existe material de consulta oficial?</div>
          <div class="q-sub">Informe o link do artigo na Central de Ajuda ou o nome da macro utilizada.</div>
          <textarea class="tinput" id="f-q4" placeholder="Ex: Artigo 'Configuração Portal Nacional NFS-e' — help.enotas.com.br/... ou Macro: [eNotas] Portal Nacional" oninput="setField('q4',this.value)">${S.form.q4||''}</textarea>
        </div>
      </div>

      <div class="section-card">
        <div class="section-title"><span class="section-num">3</span>Escalonamento</div>
        <div class="q-block">
          <div class="q-label">Escalonamento N1 → N2 foi necessário?</div>
          ${radioRow('q5',['Sim','Não'])}
          <textarea class="tinput" id="f-q5j" placeholder="Justifique o motivo do escalonamento ou ausência dele..." oninput="setField('q5j',this.value)">${S.form.q5j||''}</textarea>
        </div>
        <div class="q-block">
          <div class="q-label">Quando escalonado para N2, houve escalonamento para N3?</div>
          ${radioRow('q6',['Sim','Não','N/A'])}
          <textarea class="tinput" id="f-q6j" placeholder="Justifique..." oninput="setField('q6j',this.value)">${S.form.q6j||''}</textarea>
        </div>
      </div>

      <div class="section-card">
        <div class="section-title"><span class="section-num">4</span>Observações Gerais</div>
        <textarea class="tinput" id="f-obs" placeholder="Pontos de atenção, padrões identificados, destaques positivos ou negativos neste ticket..." oninput="setField('obs',this.value)" style="min-height:80px">${S.form.obs||''}</textarea>
      </div>

    </div>
    <div class="act-bar">
      <button class="btn btn-outline" ${S.idx===0?'disabled':''} onclick="jumpTo(${S.idx-1})">← Anterior</button>
      <div class="spacer"></div>
      <button class="btn btn-ghost" onclick="saveAnalysis(false)" ${S.saving?'disabled':''}>Só salvar</button>
      <button class="btn btn-teal" onclick="saveAnalysis(true)" ${S.saving?'disabled':''}>${S.saving?'Salvando...':S.idx<TICKETS[S.agent].length-1?'Salvar e próximo →':'Salvar'}</button>
    </div>`;
}

function radioRow(key,opts){
  return`<div class="radio-row">${opts.map(o=>{
    const cls=getSelClass(key,o);
    return`<div class="ropt${cls?' '+cls:''}" onclick="selectOpt('${key}','${o}',this)">${o}</div>`;
  }).join('')}</div>`;
}

function getSelClass(key,opt){
  if(S.form[key]!==opt)return'';
  const map={'Sim':'sel-sim','Não':'sel-nao','N/A':'sel-na','Não identificado':'sel-gen',
    'Abaixo da média':'sel-abaixo','Dentro da média':'sel-dentro','Acima da média':'sel-acima'};
  return map[opt]||'sel-gen';
}

function selectOpt(key,val,el){
  if(S.form[key]===val){S.form[key]=null;}else{S.form[key]=val;}
  // Update only the radio row
  const row=el.parentElement;
  row.querySelectorAll('.ropt').forEach(r=>{
    r.className='ropt';
    const o=r.textContent;
    if(S.form[key]===o)r.className='ropt '+getSelClass(key,o);
  });
}

function setField(key,val){S.form[key]=val;}

// ── EXPORT ────────────────────────────────────────────────────
function renderExport(){
  const el=document.getElementById('screen-export');
  const done=totalDone();
  el.innerHTML=`
    <div class="export-wrap">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <div class="export-title">Relatório e Exportação</div>
        <button class="btn btn-outline" onclick="setScreen('home')" style="font-size:12px">← Voltar</button>
      </div>
      <div class="export-sub">Baixe os dados individuais por agente ou o compilado completo com todos os 248 tickets.</div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-val">${done}</div><div class="stat-lbl">Analisados</div></div>
        <div class="stat-card"><div class="stat-val">${248-done}</div><div class="stat-lbl">Pendentes</div></div>
        <div class="stat-card"><div class="stat-val">${Math.round(done/248*100)}%</div><div class="stat-lbl">Conclusão geral</div></div>
      </div>

      <div class="exp-card">
        <div class="exp-card-title">Exportar compilado — todos os agentes</div>
        <div class="exp-card-sub">CSV com todos os 248 tickets em uma única planilha. Ideal para o relatório final.</div>
        <div class="btn-row">
          <button class="btn btn-teal" onclick="exportCSV(null)">Baixar compilado completo (${248} linhas)</button>
          <button class="btn btn-outline" onclick="exportCSV(null,true)">Apenas analisados (${done} linhas)</button>
        </div>
      </div>

      <div class="exp-card">
        <div class="exp-card-title">Exportar por agente</div>
        <div class="exp-card-sub">CSV individual de cada agente com seus tickets e análises.</div>
        <div class="btn-row">
          ${AGENTS.map(a=>`<button class="btn btn-outline" onclick="exportCSV('${a}')" style="font-size:12px">Baixar ${a} (${agentDone(a)}/${agentTotal(a)})</button>`).join('')}
        </div>
      </div>

      <div class="exp-card">
        <div class="exp-card-title">Progresso por agente</div>
        <div class="exp-prog">
          ${AGENTS.map(a=>`
          <div class="exp-agent-row">
            <div class="exp-av ${AGENT_AV[a]}">${a[0]}</div>
            <div class="exp-name">${a}</div>
            <div class="exp-bar-wrap"><div class="exp-bar-fill ${AGENT_PF[a]}" style="width:${agentPct(a)}%"></div></div>
            <div class="exp-stat">${agentDone(a)} / ${agentTotal(a)}</div>
          </div>`).join('')}
        </div>
      </div>

    </div>`;
}

function exportCSV(agentFilter,onlyDone=false){
  const headers=['Ticket ID','Agente','Tema','Categoria','Contact Reason Correto','Macros Utilizadas','Tempo vs FR',
    'Material de Consulta','Escalonamento N1→N2','Justificativa N1→N2','Escalonamento N2→N3','Justificativa N2→N3','Observações','Salvo em'];
  const tks=agentFilter?TICKETS[agentFilter]:Object.values(TICKETS).flat();
  const filtered=onlyDone?tks.filter(t=>S.analyses[t[0]]):tks;
  const rows=filtered.map(([id,tema,cat])=>{
    const a=S.analyses[id];
    if(!a)return[id,AGENT_OF[id],tema,cat,'','','','','','','','','',''].map(csvE).join(',');
    return[id,a.agent,a.tema,a.categoria,a.q1||'',a.q2||'',a.q3||'',a.q4||'',a.q5||'',a.q5j||'',a.q6||'',a.q6j||'',a.obs||'',a.savedAt||''].map(csvE).join(',');
  });
  const csv='\uFEFF'+headers.map(csvE).join(',')+'\n'+rows.join('\n');
  const name=agentFilter?`eNotas_GC_${agentFilter}_${today()}.csv`:`eNotas_GC_Compilado_${today()}.csv`;
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=name;a.click();URL.revokeObjectURL(url);
  toast('Download iniciado!');
}

function csvE(v){
  const s=String(v==null?'':v);
  return(s.includes(',')||s.includes('"')||s.includes('\n'))?'"'+s.replace(/"/g,'""')+'"':s;
}
function today(){return new Date().toISOString().slice(0,10);}

// ── TOAST ─────────────────────────────────────────────────────
let toastTimer;
function toast(msg,cls='t-ok'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast '+cls+' show';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.className='toast',2500);
}

// ── START ─────────────────────────────────────────────────────
renderAgentPills();
init();
</script>
</body>
</html>
